<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Submit Report — TekFix</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<!-- Custom top nav (replaces sidebar on this page) -->
<nav class="submit-topnav">
  <div class="brand">Tek<span>Fix</span></div>
  <div class="nav-links">
    <a href="dashboard.html">
      <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
      <span>Dashboard</span>
    </a>
    <a href="submit.html" class="active">
      <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
      <span>Submit Report</span>
    </a>
    <a href="history.html">
      <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      <span>My Submissions</span>
    </a>
  </div>
  <div class="nav-right">
    <div class="avatar" id="nav-initials">SV</div>
    <span id="nav-username"></span>
    <button class="logout" id="logout-btn2">Logout</button>
  </div>
</nav>

<!-- Dark gradient canvas -->
<div class="submit-page-bg">
  <div class="submit-hero">
    <h1>Submit Shift Report</h1>
    <p>Record outlet observations for admin review</p>
  </div>
  <div id="alert-box-top"></div>

  <div class="submit-float-card">

<div class="app-shell">

  <header class="topbar">
    <div style="display:flex;align-items:center;gap:1rem">
      <button class="hamburger" id="hamburger">☰</button>
      <div class="topbar-brand">Tek<span>Fix</span> <span style="font-weight:400;color:var(--text-muted);font-size:0.82rem">Supervisor</span></div>
    </div>
    <div class="topbar-right">
      <div class="avatar" id="user-initials">SV</div>
      <span id="user-name" style="font-size:0.875rem;color:var(--slate)"></span>
      <button class="btn btn-outline btn-sm" id="logout-btn">Logout</button>
    </div>
  </header>

  <div class="body-row">

    <nav class="sidebar" id="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-label">Menu</div>
        <a href="dashboard.html" class="nav-item">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
          Dashboard
        </a>
        <a href="submit.html" class="nav-item active">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
          Submit Report
        </a>
        <a href="history.html" class="nav-item">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          My Submissions
        </a>
      </div>
    </nav>

    <main class="main-content" id="main-content">
      <div class="page-header">
        <h1>Submit Shift Report</h1>
        <p>Record outlet observations for admin review</p>
      </div>
      <div id="alert-box"></div>

      <div class="card">
        <form id="report-form">

          <!-- Row 1: Date + Outlet -->
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
            <div class="form-group">
              <label class="form-label">Reporting Date <span class="required">*</span></label>
              <input type="date" id="reporting_date" class="form-control" required>
            </div>
            <div class="form-group">
              <label class="form-label">Outlet <span class="required">*</span></label>
              <select id="outlet_id" class="form-control" required>
                <option value="">Loading outlets...</option>
              </select>
            </div>
          </div>

          <!-- Agent -->
          <div class="form-group">
            <label class="form-label">Agent Name <span class="required">*</span></label>
            <select id="agent_id" class="form-control" required>
              <option value="">Select agent...</option>
            </select>
          </div>

          <!-- Row 2: Times + Shift -->
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem" class="times-row">
            <div class="form-group">
              <label class="form-label">Opening Time</label>
              <input type="time" id="opening_time" class="form-control">
            </div>
            <div class="form-group">
              <label class="form-label">Closing Time</label>
              <input type="time" id="closing_time" class="form-control">
            </div>
            <div class="form-group">
              <label class="form-label">Shift Type <span class="required">*</span></label>
              <select id="shift_definition_id" class="form-control" required>
                <option value="">Loading shifts...</option>
              </select>
            </div>
          </div>

          <!-- Balance Status -->
          <div class="form-group">
            <label class="form-label">Balance Status <span class="required">*</span></label>
            <div style="display:flex;gap:1.25rem;margin-top:0.3rem;flex-wrap:wrap">
              <label style="display:flex;align-items:center;gap:0.5rem;cursor:pointer">
                <input type="radio" name="balance_status" value="Balanced" required>
                <span class="badge badge-green">✓ Balanced</span>
              </label>
              <label style="display:flex;align-items:center;gap:0.5rem;cursor:pointer">
                <input type="radio" name="balance_status" value="Unbalanced">
                <span class="badge badge-red">✗ Unbalanced</span>
              </label>
            </div>
          </div>

          <!-- Star Ratings — uses .scores-row so mobile stacks correctly -->
          <div class="scores-row">
            <div class="score-group form-group">
              <label class="form-label">CSAT Score <span class="required">*</span></label>
              <div class="star-rating">
                <input type="radio" name="csat_score" id="c5" value="5"><label for="c5">★</label>
                <input type="radio" name="csat_score" id="c4" value="4"><label for="c4">★</label>
                <input type="radio" name="csat_score" id="c3" value="3"><label for="c3">★</label>
                <input type="radio" name="csat_score" id="c2" value="2"><label for="c2">★</label>
                <input type="radio" name="csat_score" id="c1" value="1"><label for="c1">★</label>
              </div>
            </div>
            <div class="score-group form-group">
              <label class="form-label">Team Relationship Score <span class="required">*</span></label>
              <div class="star-rating">
                <input type="radio" name="team_score" id="t5" value="5"><label for="t5">★</label>
                <input type="radio" name="team_score" id="t4" value="4"><label for="t4">★</label>
                <input type="radio" name="team_score" id="t3" value="3"><label for="t3">★</label>
                <input type="radio" name="team_score" id="t2" value="2"><label for="t2">★</label>
                <input type="radio" name="team_score" id="t1" value="1"><label for="t1">★</label>
              </div>
            </div>
            <div class="score-group form-group">
              <label class="form-label">Cleanliness Score <span class="required">*</span></label>
              <div class="star-rating">
                <input type="radio" name="cleanliness_score" id="cl5" value="5"><label for="cl5">★</label>
                <input type="radio" name="cleanliness_score" id="cl4" value="4"><label for="cl4">★</label>
                <input type="radio" name="cleanliness_score" id="cl3" value="3"><label for="cl3">★</label>
                <input type="radio" name="cleanliness_score" id="cl2" value="2"><label for="cl2">★</label>
                <input type="radio" name="cleanliness_score" id="cl1" value="1"><label for="cl1">★</label>
              </div>
            </div>
          </div>

          <!-- Unprofessional Behavior -->
          <div class="form-group">
            <label class="form-label">Unprofessional Behavior Observed</label>
            <select id="unprofessional_behavior" class="form-control">
              <option value="">None</option>
              <option value="Late Arrival">Late Arrival</option>
              <option value="Insubordination">Insubordination</option>
              <option value="Phone Misuse">Phone Misuse</option>
              <option value="Poor Customer Handling">Poor Customer Handling</option>
              <option value="Other">Other (describe below)</option>
            </select>
          </div>

          <!-- Text Areas -->
          <div class="form-group">
            <label class="form-label">Specific Challenges</label>
            <textarea id="specific_challenges" class="form-control" rows="3"
              placeholder="Describe any operational challenges observed during this shift..."></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">Areas of Improvement</label>
            <textarea id="areas_of_improvement" class="form-control" rows="3"
              placeholder="Your recommendations for improvement..."></textarea>
          </div>

          <!-- Actions -->
          <div style="display:flex;gap:1rem;justify-content:flex-end;margin-top:1.25rem;flex-wrap:wrap">
            <button type="reset" class="btn btn-outline" id="clear-btn">Clear Form</button>
            <button type="submit" class="btn btn-gold" id="submit-btn">Submit Report</button>
          </div>

        </form>
      </div>
    </main>

  </div><!-- /.body-row -->
</div><!-- /.app-shell -->
  </div><!-- /.submit-float-card -->
</div><!-- /.submit-page-bg -->

<style>
  /* ── Override: hide sidebar, promote to top nav ── */
  .sidebar {
    display: none !important;
  }
  .body-row {
    display: block !important;
  }
  .topbar {
    display: none !important;
  }

  /* ── Custom top nav for submit page ── */
  .submit-topnav {
    position: sticky;
    top: 0;
    z-index: 200;
    background: #0F172A;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 2.5rem;
    height: 54px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.25);
  }
  .submit-topnav .brand {
    font-weight: 900;
    font-size: 1.15rem;
    color: white;
    letter-spacing: -0.5px;
  }
  .submit-topnav .brand span { color: #14B8A6; }
  .submit-topnav .nav-links {
    display: flex;
    align-items: center;
    gap: 0.25rem;
  }
  .submit-topnav .nav-links a {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.4rem 0.9rem;
    border-radius: 6px;
    color: rgba(255,255,255,0.55);
    font-size: 0.82rem;
    font-weight: 500;
    text-decoration: none;
    transition: all 0.18s ease;
  }
  .submit-topnav .nav-links a:hover { color: white; background: rgba(255,255,255,0.08); }
  .submit-topnav .nav-links a.active { color: #14B8A6; background: rgba(20,184,166,0.15); }
  .submit-topnav .nav-right {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  .submit-topnav .nav-right span { font-size: 0.82rem; color: rgba(255,255,255,0.55); }
  .submit-topnav .nav-right .avatar {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, #0F766E, #D97706);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.72rem; font-weight: 800; color: white;
  }
  .submit-topnav .nav-right .logout {
    padding: 0.3rem 0.8rem;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 6px;
    color: rgba(255,255,255,0.6);
    font-size: 0.78rem;
    background: none;
    cursor: pointer;
    transition: all 0.18s ease;
  }
  .submit-topnav .nav-right .logout:hover { border-color: #14B8A6; color: #14B8A6; }

  /* ── Page canvas ── */
  .submit-page-bg {
    min-height: calc(100vh - 54px);
    background: linear-gradient(160deg, #0F172A 0%, #1E3A5F 40%, #0F3D38 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2.5rem 1.5rem 4rem;
    position: relative;
    overflow: hidden;
  }
  /* Decorative orbs */
  .submit-page-bg::before {
    content: '';
    position: absolute;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(20,184,166,0.12) 0%, transparent 70%);
    top: -100px; right: -100px;
    pointer-events: none;
  }
  .submit-page-bg::after {
    content: '';
    position: absolute;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(217,119,6,0.08) 0%, transparent 70%);
    bottom: -80px; left: -80px;
    pointer-events: none;
  }

  /* ── Page header above card ── */
  .submit-hero {
    text-align: center;
    margin-bottom: 2rem;
    position: relative; z-index: 1;
  }
  .submit-hero h1 {
    font-size: 1.6rem;
    font-weight: 800;
    color: white;
    letter-spacing: -0.5px;
    margin-bottom: 0.3rem;
  }
  .submit-hero p {
    color: rgba(255,255,255,0.45);
    font-size: 0.875rem;
  }

  /* ── Floating form card ── */
  .submit-float-card {
    width: 100%;
    max-width: 720px;
    background: rgba(255,255,255,0.97);
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.15);
    box-shadow: 0 24px 64px rgba(0,0,0,0.45), 0 4px 16px rgba(0,0,0,0.2);
    padding: 2.25rem 2.5rem;
    position: relative; z-index: 1;
  }

  /* Section dividers inside card */
  .form-section {
    padding-bottom: 1.25rem;
    margin-bottom: 1.25rem;
    border-bottom: 1px solid #EEF2F7;
  }
  .form-section:last-of-type { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

  /* Times row stacks on mobile */
  @media (max-width: 640px) {
    .times-row { grid-template-columns: 1fr !important; }
    .submit-float-card { padding: 1.5rem 1.25rem; }
    .submit-topnav { padding: 0 1rem; }
    .submit-topnav .nav-links a span { display: none; }
  }
  @media (max-width: 520px) {
    div[style*="grid-template-columns:1fr 1fr"] { grid-template-columns: 1fr !important; }
  }
</style>

<script type="module">
  import { requireAuth, logout } from '../js/auth.js';
  import { supabase, getOutlets, getAgents, getShiftDefinitions, populateSelect, showToast, logAction } from '../js/supabase-client.js';

  document.getElementById('logout-btn').onclick = logout;
  document.getElementById('logout-btn2').onclick = logout;

  document.getElementById('hamburger').onclick = () => {
    document.getElementById('sidebar').classList.toggle('open');
  };
  document.getElementById('main-content').onclick = () => {
    document.getElementById('sidebar').classList.remove('open');
  };

  document.getElementById('clear-btn').addEventListener('click', () => {
    document.getElementById('report-form').reset();
    document.getElementById('reporting_date').value = new Date().toISOString().split('T')[0];
  });

  (async () => {
    const profile = await requireAuth(['supervisor', 'admin']);
    if (!profile) return;

    document.getElementById('nav-username').textContent = profile.full_name.split(' ')[0];
    document.getElementById('nav-initials').textContent = profile.full_name.split(' ').map(n=>n[0]).join('').substring(0,2).toUpperCase();

    document.getElementById('reporting_date').value = new Date().toISOString().split('T')[0];

    let allAgents = [];

    try {
      const [outlets, agents, shifts] = await Promise.all([
        getOutlets(), getAgents(), getShiftDefinitions()
      ]);
      allAgents = agents;
      populateSelect(document.getElementById('outlet_id'), outlets, 'id', 'name', 'Select outlet...');
      populateSelect(document.getElementById('agent_id'),  agents,  'id', 'full_name', 'Select agent...');
      populateSelect(document.getElementById('shift_definition_id'), shifts, 'id', 'name', 'Select shift type...');
    } catch (err) {
      document.getElementById('alert-box').innerHTML =
        `<div class="alert alert-error">Failed to load form data: ${err.message}</div>`;
      return;
    }

    // Agents rotate — always show all regardless of outlet selected
    document.getElementById('outlet_id').addEventListener('change', () => {
      populateSelect(document.getElementById('agent_id'), allAgents, 'id', 'full_name', 'Select agent...');
    });

    document.getElementById('report-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      const ab  = document.getElementById('alert-box');
      btn.disabled = true; btn.textContent = 'Submitting...'; ab.innerHTML = '';

      const csatVal    = document.querySelector('input[name="csat_score"]:checked')?.value;
      const teamVal    = document.querySelector('input[name="team_score"]:checked')?.value;
      const cleanVal   = document.querySelector('input[name="cleanliness_score"]:checked')?.value;
      const balanceVal = document.querySelector('input[name="balance_status"]:checked')?.value;
      const unprofVal  = document.getElementById('unprofessional_behavior').value;

      if (!balanceVal) {
        ab.innerHTML = `<div class="alert alert-error">Please select a Balance Status.</div>`;
        btn.disabled = false; btn.textContent = 'Submit Report'; return;
      }
      if (!csatVal || !teamVal || !cleanVal) {
        ab.innerHTML = `<div class="alert alert-error">Please rate all three scores (CSAT, Team, Cleanliness).</div>`;
        btn.disabled = false; btn.textContent = 'Submit Report'; return;
      }

      const payload = {
        submitted_by:            profile.id,
        reporting_date:          document.getElementById('reporting_date').value,
        outlet_id:               document.getElementById('outlet_id').value,
        agent_id:                document.getElementById('agent_id').value,
        shift_definition_id:     document.getElementById('shift_definition_id').value || null,
        opening_time:            document.getElementById('opening_time').value || null,
        closing_time:            document.getElementById('closing_time').value || null,
        balance_status:          balanceVal,
        csat_score:              parseInt(csatVal),
        team_relationship_score: parseInt(teamVal),
        cleanliness_score:       parseInt(cleanVal),
        unprofessional_behavior: unprofVal || null,
        specific_challenges:     document.getElementById('specific_challenges').value.trim() || null,
        areas_of_improvement:    document.getElementById('areas_of_improvement').value.trim() || null,
      };

      try {
        const { data, error } = await supabase
          .from('shift_reports').insert(payload).select().single();
        if (error) throw error;
        await logAction('CREATE_REPORT', 'shift_reports', data.id, null, payload);
        ab.innerHTML = `<div class="alert alert-success">✓ Report submitted successfully! The admin has been notified.</div>`;
        document.getElementById('report-form').reset();
        document.getElementById('reporting_date').value = new Date().toISOString().split('T')[0];
        const [outlets, agents, shifts] = await Promise.all([getOutlets(), getAgents(), getShiftDefinitions()]);
        allAgents = agents;
        populateSelect(document.getElementById('outlet_id'), outlets, 'id', 'name', 'Select outlet...');
        populateSelect(document.getElementById('agent_id'),  agents,  'id', 'full_name', 'Select agent...');
        populateSelect(document.getElementById('shift_definition_id'), shifts, 'id', 'name', 'Select shift type...');
      } catch (err) {
        ab.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
      }
      btn.disabled = false; btn.textContent = 'Submit Report';
    });
  })();
</script>
</body>
</html>
